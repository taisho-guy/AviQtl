name: Build and Release Linux (x86_64)

on:
  push:
    branches:
      - main
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Distrobox and Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y distrobox podman python3-pip
          pip3 install PySide6 --break-system-packages || pip3 install PySide6

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 500M
          key: linux-ccache

      - name: Build and Package
        run: python3 BUILD.py --arch

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AviQtl-Linux-x86_64-v3
          path: dist/AviQtl-Linux-x86_64-v3.zip
          retention-days: 1
          if-no-files-found: error

      - name: Create Codeberg Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: akkuman/gitea-release-action@v1
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/AviQtl
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ""
          files: |
            dist/AviQtl-Linux-x86_64-v3.zip