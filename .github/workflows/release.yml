  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: 依存関係をインストール
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git cmake ninja clang mold zip mesa vulkan-devel libxkbcommon wayland wayland-protocols libffi ffmpeg luajit fftw qt6 lilv ladspa clap vst3sdk

      - uses: actions/checkout@v4

      - name: ビルド
        env:
          CC: clang
          CXX: clang++
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O3 -march=x86-64-v3 -flto -fno-semantic-interposition" \
            -DCMAKE_POLICY_DEFAULT_CMP0056=NEW \
            -DCMAKE_SKIP_INSTALL_RPATH=ON
            
          cmake --build build

      - name: 圧縮
        run: |
          mkdir dist
          cd build

          # 1. 実行ファイルのみコピー (ライブラリは一切コピーしない)
          cp Rina ../dist/
          
          # 2. アセットのコピー (アプリ動作に必要なデータのみ)
          if [ -d "objects" ]; then cp -r objects ../dist/; fi
          if [ -d "effects" ]; then cp -r effects ../dist/; fi
          
          # アプリ固有のプラグインがある場合のみコピー (Qtプラグインではない)
          if [ -d "plugins" ] && [ "$(ls -A plugins)" ]; then
            mkdir -p ../dist/plugins
            cp -r plugins/* ../dist/plugins/
          fi

          # 3. 圧縮
          cd ../dist
          zip -r Rina-Linux-x86_64-v3.zip .

      - name: アップロード
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-build
          path: dist/Rina-Linux-x86_64-v3.zip

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Codeberg Release
        uses: akkuman/gitea-release-action@v1
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/Rina
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ### 📥 ダウンロード

            以下の **Assets** セクションより、お使いの環境に合ったファイルをダウンロードしてください。

            ### 💬 ご意見・バグ報告

            [イシューを作成](https://codeberg.org/taisho-guy/Rina/issues/new)してください。些細なフィードバックでも開発の大きな励みになります。

            ### 🔨 開発に参加する

            [リポジトリ](https://codeberg.org/taisho-guy/Rina)をクローンし、変更を加えた上で[プルリクエスト](https://codeberg.org/taisho-guy/Rina/pulls)を作成して下さい。
            > [!NOTE]
            > 本プロジェクトへの貢献は[GNU Affero General Public License Version 3](https://www.gnu.org/licenses/agpl-3.0.txt)に基づいて公開されます。
          files: |
            artifacts/**/*.zip
