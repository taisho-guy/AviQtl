name: Build and Release (Win/Mac)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-declarative
            mingw-w64-ucrt-x86_64-qt6-quick3d
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-shadertools
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-5compat
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-luajit
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-mold
            zip

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          mkdir dist
          cd build
          
          # パスをWindows形式の絶対パスに変換
          QML_DIR=$(cygpath -w "$(pwd)/../ui/qml")
          EXE_PATH=$(cygpath -w "$(pwd)/../dist/Rina.exe")
          DIST_DIR=$(cygpath -w "$(pwd)/../dist")
          
          # windeployqtの翻訳ファイルエラー回避のため、先にexeをコピー
          cp Rina.exe ../dist/
          
          # Qt依存関係のデプロイ（絶対パスを使用）
          # windeployqtが翻訳ファイルエラーで終了コード1を返すことがあるため、|| true で抑制
          windeployqt --qmldir "$QML_DIR" --no-translations --no-compiler-runtime --release "$EXE_PATH" --dir "$DIST_DIR" || true
          
          # 2. 非Qt依存関係（FFmpeg, LuaJIT, ランタイム）の自動収集
          # システム(C:/Windows)以外のパスにある依存DLLを抽出し、distにコピー
          echo "Collecting non-Qt dependencies..."
          ldd ../dist/Rina.exe | grep -iv 'system32' | grep -iv 'windows' | grep '=> /' | awk '{print $3}' | while read -r dll_path; do
            cp -v "$dll_path" ../dist/
          done

          # 3. 再帰的な依存関係の解決（DLLが依存するDLLをコピー）
          # 1回では不足する場合があるため、dist内の全DLLに対して再度lddを実行
          find ../dist -name "*.dll" -exec ldd {} + | grep -iv 'system32' | grep -iv 'windows' | grep '=> /' | awk '{print $3}' | sort -u | while read -r dll_path; do
            cp -unv "$dll_path" ../dist/
          done

          # アセットのコピー
          cp -r objects ../dist/
          cp -r effects ../dist/
          
          # アーカイブ作成
          cd ../dist
          zip -r Rina-Windows-x64.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Rina-Windows-x64.zip

  build-macos:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew update
          brew install qt ffmpeg luajit molten-vk ninja pkg-config dylibbundler
          
          # LuaJIT & FFmpeg のライブラリディレクトリをリンカに教える
          echo "LDFLAGS=-L$(brew --prefix luajit)/lib -L$(brew --prefix ffmpeg)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix luajit)/include/luajit-2.1 -I$(brew --prefix ffmpeg)/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix luajit)/lib/pkgconfig" >> $GITHUB_ENV

          # Qtへのパスを通す
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> $GITHUB_ENV
          # Vulkan SDK for macOS (LunarG) を手動インストールしないとFindVulkanが失敗しやすい
          # 簡易的にbrewのmolten-vkを使うため、CMakeに場所を教える環境変数をセット
          echo "VULKAN_SDK=$(brew --prefix molten-vk)" >> $GITHUB_ENV
          echo "VK_ICD_FILENAMES=$(brew --prefix molten-vk)/share/vulkan/icd.d/MoltenVK_icd.json" >> $GITHUB_ENV

      - name: Build
        run: |
          # MoltenVKをVulkanとして強制的に認識させる
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DVulkan_LIBRARY=$(brew --prefix molten-vk)/lib/libMoltenVK.dylib \
            -DVulkan_INCLUDE_DIR=$(brew --prefix molten-vk)/include
          cmake --build build

      - name: Package
        run: |
          mkdir dist
          cd build
          
          # macOSの場合、Rina.appが生成されているはず
          if [ -d "Rina.app" ]; then
            # Mac用デプロイツール実行
            $(brew --prefix qt)/bin/macdeployqt Rina.app -qmldir=../ui/qml
            
            # 2. サードパーティ製ライブラリ（FFmpeg, LuaJIT）のバンドルとRPATH修正
            # -od: 依存ライブラリの出力先 (Frameworks内が通例)
            # -b: 対象のバイナリ (Executable)
            # -x: 除外設定 (/usr/lib 等はコピーしない)
            # -of: 既存のファイルを上書き
            dylibbundler -od -b -x -of \
              -cd Rina.app/Contents/Frameworks \
              -f -p @executable_path/../Frameworks/ \
              -b Rina.app/Contents/MacOS/Rina

            # アセットを含めてZip化
            zip -r ../dist/Rina-macOS-ARM64.zip Rina.app objects effects
          else
            echo "Error: Rina.app not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Rina-macOS-ARM64.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/*.zip
            artifacts/macos-build/*.zip