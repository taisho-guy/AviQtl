name: Build and Release (Win/Mac)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-declarative
            mingw-w64-ucrt-x86_64-qt6-quick3d
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-shadertools
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-5compat
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-luajit
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-mold
            zip

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          mkdir dist
          cd build
          
          # パスをWindows形式の絶対パスに変換
          QML_DIR=$(cygpath -w "$(pwd)/../ui/qml")
          EXE_PATH=$(cygpath -w "$(pwd)/../dist/Rina.exe")
          DIST_DIR=$(cygpath -w "$(pwd)/../dist")
          
          # windeployqtの翻訳ファイルエラー回避のため、先にexeをコピー
          cp Rina.exe ../dist/
          
          # qmlimportscannerの場所を特定し、PATHに追加することでwindeployqtから見えるようにする
          echo "Locating qmlimportscanner..."
          SCANNER_PATH=$(dirname "$(find /ucrt64 -name "qmlimportscanner.exe" 2>/dev/null | head -n 1)")
          
          if [ -n "$SCANNER_PATH" ]; then
            echo "Adding $SCANNER_PATH to PATH"
            export PATH="$SCANNER_PATH:$PATH"
          else
            echo "WARNING: qmlimportscanner.exe not found. windeployqt might fail."
          fi
          
          # Qt依存関係のデプロイ
          windeployqt --qmldir "$QML_DIR" --no-translations --no-compiler-runtime --release "$EXE_PATH" --dir "$DIST_DIR"
          
          # qt.confを作成してプラグイン検索パスをカレントディレクトリに固定
          echo "[Paths]" > ../dist/qt.conf
          echo "Plugins = ." >> ../dist/qt.conf
          
          # プラットフォームプラグインの存在確認と明示的コピー
          echo "Verifying Qt platform plugins..."
          if [ ! -d "../dist/platforms" ]; then
            echo "WARNING: platforms directory not created by windeployqt, copying manually..."
            mkdir -p ../dist/platforms
            QT_PLUGINS_DIR=$(dirname $(which qmake))/../share/qt6/plugins
            if [ -f "$QT_PLUGINS_DIR/platforms/qwindows.dll" ]; then
              cp -v "$QT_PLUGINS_DIR/platforms/qwindows.dll" ../dist/platforms/
            else
              echo "ERROR: qwindows.dll not found in $QT_PLUGINS_DIR/platforms/"
              exit 1
            fi
          fi
          
          # 2. 非Qt依存関係（FFmpeg, LuaJIT, ランタイム）の自動収集
          echo "Collecting non-Qt dependencies..."
          ldd ../dist/Rina.exe | grep -iv 'system32' | grep -iv 'windows' | grep '=> /' | awk '{print $3}' | while read -r dll_path; do
            # すでにdist内にあるファイルはスキップ
            if [[ "$dll_path" != *"dist/"* ]]; then
               cp -vu "$dll_path" ../dist/ || true
            fi
          done

          # 3. 再帰的な依存関係の解決
          find ../dist -name "*.dll" -exec ldd {} + | grep -iv 'system32' | grep -iv 'windows' | grep '=> /' | awk '{print $3}' | sort -u | while read -r dll_path; do
            # すでにdist内にあるファイルはスキップ
            if [[ "$dll_path" != *"dist/"* ]]; then
               cp -vu "$dll_path" ../dist/ || true
            fi
          done

          # アセットのコピー（存在確認を追加）
          # 存在すればコピー、なければ空ディレクトリを作成してクラッシュを回避
          # CMakeのfile(COPY)によりビルドディレクトリ(.)に配置されたアセットを使用
          if [ -d "objects" ]; then cp -r objects ../dist/; else echo "WARNING: objects dir not found in build dir"; fi
          if [ -d "effects" ]; then cp -r effects ../dist/; else echo "WARNING: effects dir not found in build dir"; fi
          if [ -d "plugins" ]; then cp -r plugins ../dist/; else echo "WARNING: plugins dir not found in build dir"; fi
          
          # アーカイブ作成
          cd ../dist
          zip -r Rina-Windows-x64.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Rina-Windows-x64.zip

  build-macos:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew update
          brew install qt ffmpeg luajit molten-vk ninja pkg-config dylibbundler
          
          echo "LDFLAGS=-L$(brew --prefix luajit)/lib -L$(brew --prefix ffmpeg)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix luajit)/include/luajit-2.1 -I$(brew --prefix ffmpeg)/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix luajit)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> $GITHUB_ENV
          echo "VULKAN_SDK=$(brew --prefix molten-vk)" >> $GITHUB_ENV
          echo "VK_ICD_FILENAMES=$(brew --prefix molten-vk)/share/vulkan/icd.d/MoltenVK_icd.json" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DVulkan_LIBRARY=$(brew --prefix molten-vk)/lib/libMoltenVK.dylib \
            -DVulkan_INCLUDE_DIR=$(brew --prefix molten-vk)/include
          cmake --build build

      - name: Package
        run: |
          mkdir dist
          cd build
          
          if [ -d "Rina.app" ]; then
            $(brew --prefix qt)/bin/macdeployqt Rina.app -qmldir=../ui/qml -verbose=1 || true
            
            # dylibbundler: サードパーティ製ライブラリと不足Qtライブラリのバンドル
            dylibbundler -of -cd -b -x Rina.app/Contents/MacOS/Rina \
              -d Rina.app/Contents/Frameworks \
              -p @executable_path/../Frameworks/ \
              -s $(brew --prefix qt)/lib \
              -s $(brew --prefix ffmpeg)/lib \
              -s $(brew --prefix luajit)/lib \
              -s /opt/homebrew/lib
            
            # QMLプラグイン内の依存関係修正
            find Rina.app/Contents -name "*.dylib" -o -name "*.so" | while read lib; do
              dylibbundler -of -b -x "$lib" \
                -d Rina.app/Contents/Frameworks \
                -p @executable_path/../Frameworks/ \
                -s $(brew --prefix qt)/lib \
                -s $(brew --prefix ffmpeg)/lib \
                -s $(brew --prefix luajit)/lib \
                -s /opt/homebrew/lib || true
            done
            
            # Resourcesディレクトリを作成（macdeployqtが作成しなかった場合のため）
            mkdir -p Rina.app/Contents/Resources

            # アセットのコピー（存在確認を追加）
            if [ -d "objects" ]; then
              cp -r objects Rina.app/Contents/Resources/
            elif [ -d "../objects" ]; then
              cp -r ../objects Rina.app/Contents/Resources/
            else
              echo "WARNING: objects directory not found, skipping copy."
            fi

            if [ -d "effects" ]; then
              cp -r effects Rina.app/Contents/Resources/
            elif [ -d "../effects" ]; then
              cp -r ../effects Rina.app/Contents/Resources/
            else
               echo "WARNING: effects directory not found, skipping copy."
            fi

            if [ -d "plugins" ]; then
              cp -r plugins Rina.app/Contents/Resources/
            elif [ -d "../plugins" ]; then
              cp -r ../plugins Rina.app/Contents/Resources/
            else
               echo "WARNING: plugins directory not found, skipping copy."
            fi

            zip -r ../dist/Rina-macOS-ARM64.zip Rina.app
          else
            echo "Error: Rina.app not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Rina-macOS-ARM64.zip

  build-linux:
    name: Linux (Arch Linux Rolling / Native)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm
          # ビルドと実行に必要なパッケージをすべてシステムに入れる
          pacman -S --noconfirm \
            base-devel git cmake ninja clang lld zip \
            mesa vulkan-headers vulkan-icd-loader \
            libxkbcommon wayland \
            ffmpeg luajit \
            qt6-base qt6-declarative qt6-shadertools qt6-5compat qt6-svg qt6-multimedia qt6-quick3d

      - uses: actions/checkout@v4

      - name: Build
        env:
          CC: clang
          CXX: clang++
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # RPATHの設定を変更: $ORIGIN (同梱) ではなく、システムパスを優先
          # 最適化は維持 (-march=x86-64-v3)
          # 環境変数でリンカーを明示的に ld.lld に固定
          export LD=ld.lld
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O3 -march=x86-64-v3 -flto -fno-semantic-interposition" \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld" \
            -DCMAKE_POLICY_DEFAULT_CMP0056=NEW \
            -DCMAKE_SKIP_INSTALL_RPATH=ON
            
          cmake --build build

      - name: Package
        run: |
          mkdir dist
          cd build

          # 1. 実行ファイルのみコピー (ライブラリは一切コピーしない)
          cp Rina ../dist/
          
          # 2. アセットのコピー (アプリ動作に必要なデータのみ)
          if [ -d "objects" ]; then cp -r objects ../dist/; fi
          if [ -d "effects" ]; then cp -r effects ../dist/; fi
          
          # アプリ固有のプラグインがある場合のみコピー (Qtプラグインではない)
          if [ -d "plugins" ] && [ "$(ls -A plugins)" ]; then
            mkdir -p ../dist/plugins
            cp -r plugins/* ../dist/plugins/
          fi

          # 3. 圧縮
          cd ../dist
          zip -r Rina-Linux-x86_64-v3.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-build
          path: dist/Rina-Linux-x86_64-v3.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ### 📥 ダウンロード

            以下の **Assets** セクションより、お使いの環境に合ったファイルをダウンロードしてください。

            > [!TIP]
            > **Linux版**は[Codeberg](https://codeberg.org/taisho-guy/Rina/releases)にて公開しております。

            ### 💬 ご意見・バグ報告

            [Codeberg](https://codeberg.org/taisho-guy/Rina/issues) にてイシューを作成してください。些細なフィードバックでも開発の大きな励みになります。

            ### 🔨 開発に参加する

            [リポジトリ](https://codeberg.org/taisho-guy/Rina)をクローンし、変更を加えた上で[プルリクエスト](https://codeberg.org/taisho-guy/Rina/pulls)を送ってください。
            > [!NOTE]
            > 本プロジェクトへの貢献は[GNU Affero General Public License Version 3](https://www.gnu.org/licenses/agpl-3.0.txt)に基づいて公開されます。
          files: |
            artifacts/windows-build/*.zip
            artifacts/macos-build/*.zip
            artifacts/linux-arch-build/*.zip
